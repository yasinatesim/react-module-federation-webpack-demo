[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  # Override this in Netlify site settings → Environment variables
  # Set PRODUCTS_APP_URL to your deployed products-app URL
  # e.g. https://mf-products.netlify.app
  PRODUCTS_APP_URL = "http://localhost:3001"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
